name: "go: build binaries"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create Draft Release
        id: create
        run: |
          release_id=$(gh api repos/${{ github.repository }}/releases \
            --method POST \
            -f tag_name="${{ github.ref_name }}" \
            -f name="${{ github.ref_name }}" \
            -F draft=true \
            -F generate_release_notes=true \
            --jq '.id')
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64]

    steps:
      - name: Check out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: src/go.mod

      - name: Build
        run: |
          BINARY="argocd-apps-action"
          ASSET="${BINARY}-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -o "$BINARY" ./src/cmd
          tar czf "${ASSET}.tar.gz" "$BINARY"
          md5sum "${ASSET}.tar.gz" | cut -d ' ' -f1 > "${ASSET}.tar.gz.md5"

      - name: Upload Assets
        run: |
          ASSET="argocd-apps-action-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${{ github.ref_name }}" "${ASSET}.tar.gz" "${ASSET}.tar.gz.md5"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
