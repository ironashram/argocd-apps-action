name: "ArgoCD Apps Action"
description: "Github Action to update ArgoCD Applications"
branding:
  icon: "chevrons-up"
  color: "gray-dark"
inputs:
  target_branch:
    description: "target branch"
    required: false
    default: "main"
  create_pr:
    description: "create a PR if there are new updates"
    required: false
    default: "true"
  labels:
    description: "labels to add to the PR"
    required: false
    default: "github_actions, dependencies"
  apps_folder:
    description: "folder to look for the app of apps"
    required: false
    default: "apps/manifests"
  file_extensions:
    description: "comma-separated list of file extensions to scan (e.g. yaml,yml)"
    required: false
    default: "yaml,yml"
  skip_prerelease:
    description: "if true skips semantic prerelease versions during automated upgrades"
    required: false
    default: "true"
  allow_regex_fallback:
    description: "if true, when a manifest fails YAML parse (e.g. contains Helm templating) fall back to regex extraction of chart/repoURL/targetRevision"
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Download ArgoCD Apps Action Binary
      env:
        ACTION_VERSION: "v2.2.0"
      shell: bash
      run: |
        ASSET="argocd-apps-action-${ACTION_VERSION}-linux-amd64.tar.gz"
        BASE="https://github.com/ironashram/argocd-apps-action/releases/download/${ACTION_VERSION}"
        curl -fsSL -o "${ASSET}" "${BASE}/${ASSET}"
        curl -fsSL -o "${ASSET}.sha256" "${BASE}/${ASSET}.sha256"
        echo "Verifying SHA-256 checksum"
        echo "$(cat ${ASSET}.sha256)  ${ASSET}" | sha256sum -c -
        tar -xvf "${ASSET}"
        chmod +x argocd-apps-action
        mv argocd-apps-action /usr/local/bin/argocd-apps-action

    - name: Run the ArgoCD Apps Action
      env:
        INPUT_SKIP_PRERELEASE: ${{ inputs.skip_prerelease }}
        INPUT_TARGET_BRANCH: ${{ inputs.target_branch }}
        INPUT_CREATE_PR: ${{ inputs.create_pr }}
        INPUT_APPS_FOLDER: ${{ inputs.apps_folder }}
        INPUT_LABELS: ${{ inputs.labels }}
        INPUT_FILE_EXTENSIONS: ${{ inputs.file_extensions }}
        INPUT_ALLOW_REGEX_FALLBACK: ${{ inputs.allow_regex_fallback }}
      shell: bash
      run: argocd-apps-action
